<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>USDM — Day by Day (v3)</title>
<style>
  :root {
    --bg: #ffffff; --ink: #1a1a1a; --muted: #6b7280;
    --accent: #003776; --green: #235e00; --red: #b1001c;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #000; color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    height: 100%; overflow: hidden; }
  #stage { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
  #canvas { width: 1920px; height: 1080px; flex-shrink: 0; background: var(--bg);
    position: relative; transform-origin: center center;
    box-shadow: 0 30px 80px rgba(0,0,0,0.4); }

  .topbar { position: absolute; top: 0; left: 0; right: 0; height: 56px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 32px; border-bottom: 1px solid #eee; z-index: 6; }
  .topbar .title { font-weight: 600; font-size: 18px; color: var(--ink); }
  .topbar .brand { font-size: 13px; color: var(--muted); text-align: right; line-height: 1.3; }
  .topbar .brand b { color: var(--red); }

  .day-counter { pointer-events: none; margin-bottom: 32px; }
  .day-counter .lbl { font-size: 13px; letter-spacing: 0.2em; color: var(--muted); font-weight: 600; margin-bottom: 4px; }
  .day-counter .num { font-size: 128px; font-weight: 700; color: var(--accent); line-height: 0.95;
    font-variant-numeric: tabular-nums; letter-spacing: -0.04em; }
  .day-counter .num.empty { color: #cfd5dc; font-size: 88px; }

  .diagram-wrap { position: absolute; top: 56px; left: 520px; right: 0; bottom: 88px;
    display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 16px; }
  .diagram-wrap svg { width: 100%; height: 100%; max-height: 100%; }
  .diagram-slot { position: absolute; inset: 16px; display: flex; align-items: center;
    justify-content: center; opacity: 0; pointer-events: none;
    transition: opacity 0.5s ease; }
  .diagram-slot.show { opacity: 1; pointer-events: auto; }

  .sidebar { position: absolute; top: 56px; left: 0; bottom: 88px; width: 520px;
    padding: 40px 40px 32px; display: flex; flex-direction: column;
    border-right: 1px solid #f0f0f0; background: #fafbfc; }
  .sidebar-logo { margin-top: auto; padding-top: 32px; display: flex; justify-content: center; }
  .sidebar-logo img { width: 220px; height: auto; display: block; opacity: 0.85; }

  /* Spotlight: dim only semantic leaf groups; wrappers (Canvas_1, Layer_1) untouched */
  .diagram-wrap svg g.sai, .diagram-wrap svg g.sai-main, .diagram-wrap svg g.sai-sub,
  .diagram-wrap svg g.encounter, .diagram-wrap svg g.activity,
  .diagram-wrap svg g.activity-circle, .diagram-wrap svg g.exam,
  .diagram-wrap svg g.link, .diagram-wrap svg g.link-decor,
  .diagram-wrap svg g.timing-lbl, .diagram-wrap svg g.decision {
    transition: opacity 0.4s ease;
  }
  .diagram-wrap.spotlight svg g.sai,
  .diagram-wrap.spotlight svg g.sai-main,
  .diagram-wrap.spotlight svg g.sai-sub,
  .diagram-wrap.spotlight svg g.encounter,
  .diagram-wrap.spotlight svg g.activity,
  .diagram-wrap.spotlight svg g.activity-circle,
  .diagram-wrap.spotlight svg g.exam,
  .diagram-wrap.spotlight svg g.link,
  .diagram-wrap.spotlight svg g.link-decor,
  .diagram-wrap.spotlight svg g.timing-lbl,
  .diagram-wrap.spotlight svg g.decision {
    opacity: 0.15;
  }
  .diagram-wrap.spotlight svg g.active {
    opacity: 1 !important;
  }

  /* Pulse glow on active */
  @keyframes glowBlue  { 0%,100% { filter: none; } 50% { filter: drop-shadow(0 0 8px rgba(0,55,118,0.85)); } }
  @keyframes glowRed   { 0%,100% { filter: none; } 50% { filter: drop-shadow(0 0 8px rgba(177,0,28,0.85)); } }
  @keyframes glowGreen { 0%,100% { filter: none; } 50% { filter: drop-shadow(0 0 8px rgba(35,94,0,0.85)); } }
  @keyframes glowGreenExam { 0%,100% { filter: none; } 50% { filter: drop-shadow(0 0 8px rgba(35,94,0,0.85)); } }
  .diagram-wrap.spotlight svg g.active.sai,
  .diagram-wrap.spotlight svg g.active.sai-main,
  .diagram-wrap.spotlight svg g.active.sai-sub { animation: glowBlue 1.6s ease-in-out infinite; }
  .diagram-wrap.spotlight svg g.active.encounter { animation: glowRed 1.6s ease-in-out infinite; }
  .diagram-wrap.spotlight svg g.active.activity,
  .diagram-wrap.spotlight svg g.active.activity-circle,
  .diagram-wrap.spotlight svg g.active.exam { animation: glowGreen 1.6s ease-in-out infinite; }

  .caption { pointer-events: none; }
  .caption .kicker { font-size: 13px; letter-spacing: 0.2em; color: var(--muted);
    font-weight: 600; margin-bottom: 12px; }
  .caption .title { font-size: 32px; font-weight: 700; color: var(--ink); margin: 0 0 16px;
    line-height: 1.15; letter-spacing: -0.01em; }
  .caption .body { font-size: 17px; color: #4a4a4a; line-height: 1.5; margin: 0; }

  .controls { position: absolute; left: 0; right: 0; bottom: 0; height: 88px;
    display: flex; align-items: center; gap: 16px; padding: 0 32px;
    border-top: 1px solid #f0f0f0; background: white; z-index: 6; }
  .btn { width: 44px; height: 44px; border-radius: 50%; border: 1px solid #ddd;
    background: white; color: var(--ink); font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; }
  .btn:hover { background: #f7f7f7; }
  .btn:disabled { opacity: 0.35; cursor: default; }
  .btn.play { background: var(--accent); color: white; border-color: var(--accent); width: 52px; height: 52px; font-size: 22px; }
  .scrubber { flex: 1; height: 6px; background: #eef0f2; border-radius: 3px; position: relative; cursor: pointer; }
  .scrubber .fill { position: absolute; left: 0; top: 0; bottom: 0; background: var(--accent); border-radius: 3px; transition: width 0.3s ease; }
  .counter { font-size: 13px; color: var(--muted); font-variant-numeric: tabular-nums; min-width: 60px; text-align: right; }
  .hints { position: absolute; right: 32px; bottom: 96px; font-size: 11px; color: var(--muted); z-index: 6; }
  .hints kbd { padding: 1px 6px; border: 1px solid #ddd; border-radius: 4px; background: #f9f9f9;
    font-family: ui-monospace, Menlo, monospace; font-size: 10px; }
</style>
</head>

<script>
// Day-by-day script: just list the SAIs + encounters + timing labels.
// The engine auto-lights every activity connected to an active SAI.

// Daily diary loop = SAI fires, activity fires.
const PRO_LOOP = ['PRO-SA1'];

// Convenience builder
function dayBeat(day, active, caption) {
  return { day, active: [...active, ...PRO_LOOP], caption };
}

const PRO_ONLY = (d) => dayBeat(d, [], {
  kicker: 'DAY ' + (d > 0 ? '+' + d : d),
  title: 'Daily PRO only',
  body: 'No visit today. The diary loop is the only timeline executing.'
});

window.DV3_SCRIPT = [
  // --- SoA intro ---
  {
    day: null, active: null, diagram: 'soa',
    caption: { kicker: 'WHERE WE START', title: 'The traditional Schedule of Activities',
      body: 'A grid. Visits across the top, activities down the side, ticks where they meet. Every clinical trial protocol has one. Humans read it; machines can\'t.' }
  },

  // --- USDM full picture ---
  {
    day: null, active: null,
    caption: { kicker: 'USDM TIMELINES', title: 'Same study, machine-readable',
      body: 'USDM expresses the same plan as a graph of timelines: SAIs (what), encounters (where), activities (procedures), timing arcs (when, anchored to other things). Lossless, executable. Now we\'ll step day-by-day to see which parts execute when.' }
  },
  {
    day: null, active: null,
    caption: { kicker: 'HOW TO READ', title: 'Three flows, one study',
      body: 'Top: the visit timeline (SCRN → V1 → V2 → V3). Middle: in-clinic procedure sub-flow with three exam timepoints. Bottom-left: the daily PRO diary loop.' }
  },

  // --- Day -7: SCRN ---
  dayBeat(-7,
    ['S1', 'E-SCRN', 'lbl-7b'],
    { kicker: 'DAY -7', title: 'Screening visit',
      body: 'SCRN executes — the SAI fires its connected activities (IC, Medical History, Demographics, Eligibility). The 7-days-before arc back from V1 puts this visit on the calendar.' }
  ),

  ...[-6,-5,-4,-3,-2,-1].map(PRO_ONLY),

  // --- Day 1: V1 (anchor) ---
  dayBeat(1,
    ['S2', 'E-V1', 'anchor-icon', 'anchor-timing',
     'L_anchor-timing_S1', 'L_anchor-timing_S2'],
    { kicker: 'DAY +1 — V1', title: 'Anchor visit & first dose',
      body: 'V1 fires. This is the anchor — every other visit\'s timing is computed relative to it.' }
  ),

  ...[2,3,4,5,6,7].map(PRO_ONLY),

  // --- Day 8: V2 ---
  dayBeat(8,
    ['S3', 'E-V2', 'lbl-7a'],
    { kicker: 'DAY +8 — V2', title: 'Second dose',
      body: '7 days after V1 (±2). Dose only.' }
  ),

  ...[9,10,11,12,13,14].map(PRO_ONLY),

  // --- Day 15: S4 (third dose) ---
  dayBeat(15,
    ['S4'],
    { kicker: 'DAY +15', title: 'Third dose',
      body: 'A scheduled dose between V2 and V3. The SAI fires Dose.' }
  ),

  ...[16,17,18,19,20,21].map(PRO_ONLY),

  // --- Day 22: V3 entry, S5 → S6 chain ---
  dayBeat(22,
    ['S5', 'S6', 'E-V3', 'lbl-14a', 'lbl-21a'],
    { kicker: 'DAY +22 — V3', title: 'Final visit',
      body: 'V3 fires. SAIs in sequence: PE, then QS2. Both anchored back to V1 by 14- and 21-day arcs.' }
  ),

  // --- Day 22 PK chain: pre-dose ---
  dayBeat(22,
    ['S7', 'PK1', 'lbl-1h', 'lbl-0h'],
    { kicker: 'DAY +22 — PK t=0h', title: 'Pre-dose ECG',
      body: 'PK sub-timeline initiates. First timepoint: ECG.' }
  ),
  dayBeat(22,
    ['PK2', 'lbl-0h'],
    { kicker: 'DAY +22 — PK t=0h', title: 'Pre-dose blood draw',
      body: 'Same instant as ECG: pre-dose blood sample.' }
  ),
  dayBeat(22,
    ['PK3', 'lbl-2h'],
    { kicker: 'DAY +22 — PK t=2h', title: 'Dose & 2h sample',
      body: 'Dose administered, then a final blood sample 2h later.' }
  ),

  // --- Day 22 in-clinic exam chain: CL1 → CL2 → CL3 ---
  dayBeat(22,
    ['CL1', 'lbl-10m'],
    { kicker: 'DAY +22 — Exam t=0', title: 'Exam 1',
      body: 'In-clinic procedure sub-flow: first timepoint fires Ex1.' }
  ),
  dayBeat(22,
    ['CL2', 'lbl-30m'],
    { kicker: 'DAY +22 — Exam t=10m', title: 'Exam 2',
      body: '10 minutes later: Ex2.' }
  ),
  dayBeat(22,
    ['CL3'],
    { kicker: 'DAY +22 — Exam t=40m', title: 'Exam 3',
      body: '30 minutes after Ex2: Ex3. The clinic sub-flow exits.' }
  ),

  ...[23,24,25,26,27,28,29].map(PRO_ONLY),

  // --- Outro ---
  {
    day: null, active: null,
    caption: { kicker: 'DONE', title: 'Same plan, navigated by date',
      body: 'We didn\'t change the diagram — we walked it. The USDM timelines describe what executes; the date axis is just a query into them.' }
  }
];

</script>

hite\"></ellipse>\n        <ellipse cx=\"1283.7417\" cy=\"1591.3555\" rx=\"25.5574914666651\" ry=\"24.0000383496456\" stroke=\"#235e00\" stroke-linecap=\"round\" stroke-linejoin=\"round\" stroke-width=\"3\"></ellipse>\n        <text transform=\"translate(1263.2957 1584.1875)\" fill=\"#235e00\">\n          <tspan font-family=\"Helvetica Neue\" font-size=\"12\" fill=\"#235e00\" x=\"10.335961\" y=\"11\" xml:space=\"preserve\">Ex3</tspan>\n        </text>\n      </g>\n      <g id=\"L_CL3_EX3\" data-orig=\"Line_1357\" class=\"link\">\n        <line x1=\"1283.7417\" y1=\"1507.6934\" x2=\"1283.7417\" y2=\"1552.9554\" marker-end=\"url(#FilledArrow_Marker_4)\" stroke=\"#235e00\" stroke-linecap=\"round\" stroke-linejoin=\"round\" stroke-width=\"2\"></line>\n      </g>\n      <g id=\"Line_1380\" class=\"link link-decor\">\n        <line x1=\"2113.489\" y1=\"285.22066\" x2=\"2199.101\" y2=\"286.3325\" marker-end=\"url(#FilledArrow_Marker)\" stroke=\"black\" stroke-linecap=\"round\" stroke-linejoin=\"round\" stroke-width=\"2\"></line>\n      </g>\n    </g>\n  </g>\n</svg>";
  soaSlot.innerHTML = soaText;
  usdmSlot.innerHTML = usdmText;

  [soaSlot, usdmSlot].forEach(slot => {
    const s = slot.querySelector('svg');
    if (s) {
      s.removeAttribute('width');
      s.removeAttribute('height');
      s.setAttribute('preserveAspectRatio', 'xMidYMid meet');
    }
  });
  const svg = usdmSlot.querySelector('svg');

  // Read original viewBox so we can return to "full view"
  const fullVB = svg.getAttribute('viewBox').split(/\s+/).map(Number); // [x,y,w,h]
  let curVB = fullVB.slice();
  let vbAnim = null;

  function lerp(a, b, t) { return a + (b - a) * t; }
  function easeInOut(t) { return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2)/2; }

  function setViewBox(vb) {
    svg.setAttribute('viewBox', vb.join(' '));
  }

  function animateViewBox(target, dur=700) {
    if (vbAnim) cancelAnimationFrame(vbAnim);
    const start = curVB.slice();
    const t0 = performance.now();
    function step(now) {
      const t = Math.min(1, (now - t0) / dur);
      const k = easeInOut(t);
      curVB = start.map((s, i) => lerp(s, target[i], k));
      setViewBox(curVB);
      if (t < 1) vbAnim = requestAnimationFrame(step);
      else vbAnim = null;
    }
    vbAnim = requestAnimationFrame(step);
  }

  // Compute a viewBox that frames the given element IDs with comfortable padding.
  // Returns null if no valid bbox.
  function focusViewBox(ids) {
    if (!ids || ids.length === 0) return fullVB.slice();
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    let any = false;
    ids.forEach(id => {
      const el = svg.getElementById(id);
      if (!el) return;
      let bb;
      try { bb = el.getBBox(); } catch(e) { return; }
      if (!bb || (!bb.width && !bb.height)) return;
      any = true;
      minX = Math.min(minX, bb.x);
      minY = Math.min(minY, bb.y);
      maxX = Math.max(maxX, bb.x + bb.width);
      maxY = Math.max(maxY, bb.y + bb.height);
    });
    if (!any) return fullVB.slice();
    const w = maxX - minX, h = maxY - minY;
    // Comfortable padding: 40% of the focused box, with sensible minimum
    const padX = Math.max(w * 0.4, 60);
    const padY = Math.max(h * 0.4, 60);
    let vbX = minX - padX, vbY = minY - padY;
    let vbW = w + 2 * padX, vbH = h + 2 * padY;
    // Match aspect ratio of the diagram-wrap so 'meet' doesn't distort
    const wrapEl = document.getElementById('diagram-wrap');
    const wr = wrapEl.getBoundingClientRect();
    const wrapAspect = wr.width / wr.height;
    const vbAspect = vbW / vbH;
    if (vbAspect < wrapAspect) {
      // viewBox is too tall -> widen it
      const targetW = vbH * wrapAspect;
      vbX -= (targetW - vbW) / 2;
      vbW = targetW;
    } else {
      const targetH = vbW / wrapAspect;
      vbY -= (targetH - vbH) / 2;
      vbH = targetH;
    }
    // Clamp each dimension to full view (don't zoom out further than original)
    if (vbW > fullVB[2]) {
      vbX += (vbW - fullVB[2]) / 2;
      vbW = fullVB[2];
    }
    if (vbH > fullVB[3]) {
      vbY += (vbH - fullVB[3]) / 2;
      vbH = fullVB[3];
    }
    return [vbX, vbY, vbW, vbH];
  }

  // Canvas scaling
  function fit() {
    const c = document.getElementById('canvas');
    const sx = window.innerWidth / 1920;
    const sy = window.innerHeight / 1080;
    c.style.transform = 'scale(' + Math.min(sx, sy) + ')';
  }
  window.addEventListener('resize', fit); fit();

  // Engine
  const script = window.DV3_SCRIPT;
  let idx = 0;

  function applyBeat(i) {
    idx = Math.max(0, Math.min(script.length - 1, i));
    const beat = script[idx];

    // Toggle which diagram is shown
    const which = beat.diagram || 'usdm';
    soaSlot.classList.toggle('show', which === 'soa');
    usdmSlot.classList.toggle('show', which === 'usdm');

    const dn = document.getElementById('day-num');
    if (beat.day === null) { dn.textContent = '—'; dn.classList.add('empty'); }
    else { dn.textContent = (beat.day > 0 ? '+' : '') + beat.day; dn.classList.remove('empty'); }

    document.getElementById('cap-kicker').textContent = beat.caption.kicker;
    document.getElementById('cap-title').textContent  = beat.caption.title;
    document.getElementById('cap-body').textContent   = beat.caption.body;

    // Clear previous active
    svg.querySelectorAll('.active').forEach(el => el.classList.remove('active'));
    if (beat.active === null) {
      wrap.classList.remove('spotlight');
      animateViewBox(fullVB.slice());
    } else {
      wrap.classList.add('spotlight');

      // Expand: for each active SAI, auto-include its outgoing activity links + targets.
      // Convention: link IDs are L_<source>_<target>. If <source> is an active SAI and
      // <target> is an activity / exam node, light them up too.
      const expanded = new Set(beat.active);
      const allGroups = svg.querySelectorAll('g[id]');
      allGroups.forEach(g => {
        const id = g.id;
        if (!id.startsWith('L_')) return;
        const m = id.match(/^L_([^_]+(?:-[^_]+)?)_(.+)$/);
        if (!m) return;
        const src = m[1], tgt = m[2];
        // Only auto-link from SAI sources
        const srcEl = svg.getElementById(src);
        if (!srcEl) return;
        const isSai = srcEl.classList.contains('sai') || srcEl.classList.contains('sai-main') || srcEl.classList.contains('sai-sub');
        if (!isSai) return;
        if (!expanded.has(src)) return;
        const tgtEl = svg.getElementById(tgt);
        if (!tgtEl) return;
        const isActivity = tgtEl.classList.contains('activity') ||
                           tgtEl.classList.contains('activity-circle') ||
                           tgtEl.classList.contains('exam');
        if (isActivity) {
          expanded.add(tgt);
          expanded.add(id); // the link itself
        }
      });

      expanded.forEach(id => {
        const el = svg.getElementById(id);
        if (el) el.classList.add('active');
      });

      // Auto-zoom to the active set (comfortable padding)
      // Exclude the always-on PRO loop (it's ambient context, not the focus)
      const PRO_LOOP_IDS = new Set(['PRO-SA1', 'PRO-SA2', 'A-PRO',
        'L_PRO-SA1_A-PRO', 'L_PRO-SA2_PRO-SA1', 'D-PRO', 'lbl-1d']);
      const focusIds = [...expanded].filter(id => !PRO_LOOP_IDS.has(id));
      const target = focusViewBox(focusIds.length ? focusIds : [...expanded]);
      animateViewBox(target);
    }

    document.getElementById('counter').textContent = (idx + 1) + ' / ' + script.length;
    document.getElementById('fill').style.width = (idx / (script.length - 1) * 100) + '%';
    document.getElementById('prev').disabled = idx === 0;
    try { window.parent.postMessage({slideIndexChanged: idx}, '*'); } catch(e){}
  }

  document.getElementById('play').addEventListener('click', () => applyBeat(idx + 1));
  document.getElementById('prev').addEventListener('click', () => applyBeat(idx - 1));
  document.getElementById('scrub').addEventListener('click', (e) => {
    const r = e.currentTarget.getBoundingClientRect();
    applyBeat(Math.round((e.clientX - r.left) / r.width * (script.length - 1)));
  });
  window.addEventListener('keydown', (e) => {
    if (e.key === ' ' || e.key === 'ArrowRight' || e.key === 'PageDown') { e.preventDefault(); applyBeat(idx+1); }
    else if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); applyBeat(idx-1); }
    else if (e.key === 'Home') { e.preventDefault(); applyBeat(0); }
    else if (e.key === 'End') { e.preventDefault(); applyBeat(script.length - 1); }
  });

  window.engine = { go: applyBeat, get idx() { return idx; }, len: script.length };
  applyBeat(0);

  // --- Auto-advance render mode ---
  // Activated by ?play=1 (or pressing 'P').
  // Holds longer on intro beats; shorter on PRO-only repeats.
  const params = new URLSearchParams(location.search);
  let autoTimer = null;
  let autoOn = false;

  function holdMs(beat) {
    if (beat.active === null) return 5000;          // intro / outro: read time
    const isProOnly = beat.active.length <= 1 &&    // just PRO-SA1
                      beat.caption.title === 'Daily PRO only';
    return isProOnly ? 1200 : 3500;                 // skim PRO days, dwell on visits
  }

  function autoStep() {
    if (!autoOn) return;
    const beat = script[idx];
    autoTimer = setTimeout(() => {
      if (idx >= script.length - 1) {
        autoOn = false;
        document.getElementById('play').textContent = '›';
        return;
      }
      applyBeat(idx + 1);
      autoStep();
    }, holdMs(beat));
  }

  function startAuto() {
    autoOn = true;
    document.getElementById('play').textContent = '❚❚';
    if (idx >= script.length - 1) applyBeat(0);
    autoStep();
  }
  function stopAuto() {
    autoOn = false;
    document.getElementById('play').textContent = '›';
    if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; }
  }

  // Toggle auto mode: P key, or long-press hint via shift+space
  window.addEventListener('keydown', (e) => {
    if (e.key === 'p' || e.key === 'P') { e.preventDefault(); autoOn ? stopAuto() : startAuto(); }
    if (autoOn && (e.key === 'ArrowRight' || e.key === 'ArrowLeft' || e.key === ' ')) stopAuto();
  });

  // Override play button: in auto mode it pauses; otherwise it advances one
  const playBtn = document.getElementById('play');
  playBtn.replaceWith(playBtn.cloneNode(true));
  document.getElementById('play').addEventListener('click', () => {
    if (autoOn) stopAuto();
    else applyBeat(idx + 1);
  });
  // Long-press play button (>500ms) starts auto
  let pressT = null;
  document.getElementById('play').addEventListener('mousedown', () => {
    pressT = setTimeout(() => { startAuto(); pressT = null; }, 500);
  });
  document.getElementById('play').addEventListener('mouseup', () => {
    if (pressT) { clearTimeout(pressT); pressT = null; }
  });

  // Auto-start from URL
  if (params.get('play') === '1') {
    setTimeout(startAuto, 800);  // give SVGs time to settle
  }
})();
</script>
</body>
</html>
